<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>बुढ़े वाले हनुमान जी मंदिर</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #fff7f0;
}

header {
  background: linear-gradient(90deg, #ff6600, #cc0000);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

.hero {
  height: 90vh;
  background: url("https://github.com/Anuj1-web/Temple/blob/main/temple1.jpg.png?raw=true") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-shadow: 2px 2px 10px black;
  font-size: 40px;
}

.section {
  padding: 40px;
  text-align: center;
}

.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 300px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.mantra-btn {
  background: linear-gradient(45deg, #ff6600, #cc0000);
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}

.mantra-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff7f0;
  z-index: 999;
  overflow-y: auto;
}

.mantra-content {
  padding: 30px;
  text-align: center;
}

.mantra-box {
  text-align: center;
  background: #2b1a00;
  padding: 25px;
  border-radius: 12px;
  max-width: 800px;
  margin: auto;
  box-shadow: 0 5px 25px rgba(0,0,0,0.4);
}

.mantra-box h2 {
  color: #fff;
  text-shadow:
    0 0 5px rgba(255,255,255,0.9),
    0 0 10px rgba(255,215,0,0.7),
    0 0 15px rgba(255,165,0,0.5);
}

.mantra-box pre {
  white-space: pre-wrap;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 20px;
  line-height: 2;
  color: #ffd700;
}

.back-btn {
  background: #cc0000;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-bottom: 20px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🙏 बुढ़े वाले हनुमान जी मंदिर 🙏</header>

<div class="hero">जय श्री राम 🚩</div>

<!-- GALLERY -->
<div class="section">
<h2>हनुमान जी के दर्शन</h2>

<div class="cards">
<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/temple2.jpg.png?raw=true">
<p>मंदिर दर्शन</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/panchmukhi-hanuman.webp?raw=true">
<p>पंचमुखी हनुमान</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/hanuman-shakti.webp?raw=true">
<p>हनुमान जी शक्ति रूप</p>
</div>
</div>
</div>

<!-- BUTTONS -->
<div class="section">
<div class="cards">

<div class="card">
<button class="mantra-btn" onclick="openMantra('bajrang')">🚩 बजरंग बाण</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('chalisa')">📜 हनुमान चालीसा</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('aarti')">🪔 हनुमान आरती</button>
</div>

</div>
</div>

<!-- FULL SCREEN -->
<div id="mantraScreen" class="mantra-screen">
  <div class="mantra-content">
    <button class="back-btn" onclick="closeMantra()">⬅ वापस जाएं</button>
    <div id="mantraText"></div>
  </div>
</div>

<script>
function openMantra(type){
  document.getElementById("mantraScreen").style.display = "block";

  let text = "";

  if(type === "bajrang"){
    text = `
    <div class="mantra-box">
      <h2>🚩 बजरंग बाण</h2>
      <pre>
निश्चय प्रेम प्रतीति ते...
जय हनुमान ॥
      </pre>
    </div>`;
  }

  if(type === "chalisa"){
    text = `
    <div class="mantra-box">
      <h2>📜 हनुमान चालीसा</h2>
      <pre>
जय हनुमान ज्ञान गुन सागर...
राम दूत अतुलित बल धामा ॥
      </pre>
    </div>`;
  }

  if(type === "aarti"){
    text = `
    <div class="mantra-box">
      <h2>🪔 हनुमान आरती</h2>
      <pre>
आरती कीजै हनुमान लला की...
दुष्ट दलन रघुनाथ कला की ॥
      </pre>
    </div>`;
  }

  document.getElementById("mantraText").innerHTML = text;
}

function closeMantra(){
  document.getElementById("mantraScreen").style.display = "none";
}
</script>

</body>
</html>
