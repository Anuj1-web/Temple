<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>बुढ़े वाले हनुमान जी मंदिर</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #fff7f0;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #ff6600, #cc0000);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("https://github.com/Anuj1-web/Temple/blob/main/temple1.jpg.png?raw=true") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-shadow: 2px 2px 10px black;
  font-size: 40px;
}

/* SECTION */
.section {
  padding: 40px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 300px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTONS */
.mantra-btn {
  background: linear-gradient(45deg, #ff6600, #cc0000);
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}

.mantra-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff7f0;
  z-index: 999;
  overflow-y: auto;
}

.mantra-content {
  padding: 30px;
  text-align: center;
}

.mantra-box {
  text-align: center;
  background: #2b1a00;
  padding: 25px;
  border-radius: 12px;
  max-width: 800px;
  margin: auto;
  box-shadow: 0 5px 25px rgba(0,0,0,0.4);
}

.mantra-box h2 {
  color: #fff;
  text-shadow:
    0 0 5px rgba(255,255,255,0.9),
    0 0 10px rgba(255,215,0,0.7),
    0 0 15px rgba(255,165,0,0.5);
}

.mantra-box pre {
  white-space: pre-wrap;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 20px;
  line-height: 2;
  display: inline-block;
  text-align: left;

  color: #ffd700;   /* ✅ ADD THIS LINE (MOST IMPORTANT FIX) */

  text-shadow: 
    0 0 5px rgba(255, 215, 0, 0.7),
    0 0 10px rgba(255, 165, 0, 0.5),
    0 0 15px rgba(255, 140, 0, 0.3);
}

.back-btn {
  background: #cc0000;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-bottom: 20px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🙏 बुढ़े वाले हनुमान जी मंदिर 🙏</header>

<div class="hero">जय श्री राम 🚩</div>

<!-- GALLERY -->
<div class="section">
<h2>हनुमान जी के दर्शन</h2>

<div class="cards">

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/temple2.jpg.png?raw=true">
<p>मंदिर दर्शन</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/panchmukhi-hanuman.webp?raw=true">
<p>पंचमुखी हनुमान</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/hanuman-shakti.webp?raw=true">
<p>हनुमान जी शक्ति रूप</p>
</div>

</div>
</div>

<!-- BUTTONS -->
<div class="section">
<div class="cards">

<div class="card">
<button class="mantra-btn" onclick="openMantra('bajrang')">🚩 बजरंग बाण</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('chalisa')">📜 हनुमान चालीसा</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('aarti')">🪔 हनुमान आरती</button>
</div>

</div>
</div>

<!-- FULL SCREEN -->
<div id="mantraScreen" class="mantra-screen">
  <div class="mantra-content">
    <button class="back-btn" onclick="closeMantra()">⬅ वापस जाएं</button>
    <div id="mantraText"></div>
  </div>
</div>

<script>
function openMantra(type){
  document.getElementById("mantraScreen").style.display = "block";

  let text = "";

  if(type === "bajrang"){
    text = `
    <div class="mantra-box">
      <h2>🚩 बजरंग बाण</h2>
      <pre>निश्चय प्रेम प्रतीति ते...</pre>
    </div>`;
  }

  if(type === "chalisa"){
    text = `
    <div class="mantra-box">
      <h2>📜 हनुमान चालीसा</h2>
      <pre>जय हनुमान ज्ञान गुन सागर...</pre>
    </div>`;
  }

  if(type === "aarti"){
    text = `
    <div class="mantra-box">
      <h2>🪔 हनुमान आरती</h2>
      <pre>आरती कीजै हनुमान लला की...</pre>
    </div>`;
  }

  document.getElementById("mantraText").innerHTML = text;
}

function closeMantra(){
  document.getElementById("mantraScreen").style.display = "none";
}
</script>
<!-- HOME -->
<div id="homePage" class="section">
  <h2>सेवा एवं दान</h2>

  <div class="cards">
    <div class="card" onclick="openPage('bhandaraPage')">
      <h3>🍛 मंदिर एवं भंडारा दान</h3>
    </div>

    <div class="card" onclick="openPage('dhwajPage')">
      <h3>🚩 ध्वज सेवा</h3>
    </div>
  </div>
</div>

<style>
.page {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff7f0;
  padding-top: 40px;
  z-index: 1000;
  overflow-y: auto;
}

/* PREMIUM FORM CARD */
.form-card {
  background: linear-gradient(135deg, #ff6600, #cc0000);
  color: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  text-align: center;

  box-shadow: 
    0 0 20px rgba(255,102,0,0.6),
    0 0 40px rgba(255,0,0,0.3);

  animation: fadeIn 0.5s ease;
}

.form-card input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 8px;
}

/* BUTTON */
.btn2 {
  background: white;
  color: #cc0000;
  padding: 12px 20px;
  border: none;
  margin-top: 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* BACK */
.back {
  text-align: center;
  margin-bottom: 20px;
  font-weight: bold;
  cursor: pointer;
  color: #cc0000;
}

/* QR PAGE */
.qr-page {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ffcc80, #ff6600);
  text-align: center;
  padding-top: 60px;
  z-index: 1000;
}

.qr-box {
  background: white;
  padding: 25px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

/* RESPONSIVE QR */
.qr-box img {
  width: 80%;
  max-width: 350px;
  height: auto;
  display: block;
  margin: auto;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}
</style>

<!-- BHANDARA PAGE -->
<div id="bhandaraPage" class="page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="form-card">
    <h3>🍛 मंदिर एवं भंडारा दान</h3>

    <input placeholder="नाम">
    <input placeholder="पिता का नाम">
    <input placeholder="पता">
    <input id="b_amount" placeholder="दान राशि">

    <button class="btn2" onclick="openQR('bhandara')">Proceed to Pay</button>
  </div>
</div>

<!-- DHWAJ PAGE -->
<div id="dhwajPage" class="page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="form-card">
    <h3>🚩 ध्वज सेवा</h3>

    <input placeholder="नाम">
    <input placeholder="पिता का नाम">
    <input placeholder="पता">
    <input id="flags" placeholder="ध्वज संख्या" oninput="calc()">

    <h3 id="total">कुल राशि: ₹0</h3>

    <button class="btn2" onclick="openQR('dhwaj')">Proceed to Pay</button>
  </div>
</div>

<!-- QR PAGE -->
<div id="qrPage" class="qr-page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="qr-box">
    <h3>भुगतान करें</h3>

    <img id="qrImage">

    <p id="payAmount"></p>
  </div>
</div>

<script>

/* MANTRA */
function openMantra(type){
  document.getElementById("mantraScreen").style.display = "block";

  let text = "";

  if(type === "bajrang"){
    text = document.getElementById("bajrangText").innerHTML;
  }

  if(type === "chalisa"){
    text = document.getElementById("chalisaText").innerHTML;
  }

  if(type === "aarti"){
    text = document.getElementById("aartiText").innerHTML;
  }

  document.getElementById("mantraText").innerHTML = text;
}

function closeMantra(){
  document.getElementById("mantraScreen").style.display = "none";
}


/* PAGES */
function openPage(page){
  document.getElementById("homePage").style.display = "none";
  document.getElementById("bhandaraPage").style.display = "none";
  document.getElementById("dhwajPage").style.display = "none";
  document.getElementById("qrPage").style.display = "none";

  document.getElementById(page).style.display = "block";
}

function goHome(){
  document.getElementById("homePage").style.display = "block";
  document.getElementById("bhandaraPage").style.display = "none";
  document.getElementById("dhwajPage").style.display = "none";
  document.getElementById("qrPage").style.display = "none";
}


/* CALC */
function calc(){
  let f = document.getElementById("flags").value || 0;
  document.getElementById("total").innerText = "कुल राशि: ₹" + (f * 200);
}


/* QR */
function openQR(type){
  let amount = 0;
  let upiID = "7878426819@ibl";

  if(type === "dhwaj"){
    let flags = document.getElementById("flags").value || 0;
    amount = flags * 200;
  }

  if(type === "bhandara"){
    amount = document.getElementById("b_amount").value || 0;
  }

  let upiLink = `upi://pay?pa=${upiID}&pn=Temple&am=${amount}&cu=INR`;

  document.getElementById("qrImage").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(upiLink)}`;

  document.getElementById("payAmount").innerText = "राशि: ₹" + amount;

  document.getElementById("bhandaraPage").style.display = "none";
  document.getElementById("dhwajPage").style.display = "none";
  document.getElementById("qrPage").style.display = "block";
}

</script>
</body>
</html>
