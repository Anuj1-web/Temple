<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>बुढ़े वाले हनुमान जी मंदिर</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #fff7f0;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #ff6600, #cc0000);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 90vh;
  background: url("https://github.com/Anuj1-web/Temple/blob/main/temple1.jpg.png?raw=true") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-shadow: 2px 2px 10px black;
  font-size: 40px;
}

/* SECTION */
.section {
  padding: 40px;
  text-align: center;
}

/* CARDS */
.cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 300px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTONS */
.btn {
  background: #ff6600;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 8px;
}

/* FORM */
.form-box {
  display: none;
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
}

/* LIST */
.list {
  background: white;
  margin: 20px;
  padding: 20px;
}
</style>
</head>

<body>

<header>
🙏 बुढ़े वाले हनुमान जी मंदिर 🙏
</header>

<div class="hero">
जय श्री राम 🚩
</div>

<!-- GALLERY -->
<div class="section">
<h2>हनुमान जी के दर्शन</h2>
<div class="cards">

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/temple2.jpg.png?raw=true">
<p>मंदिर दर्शन</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/panchmukhi-hanuman.webp?raw=true">
<p>पंचमुखी हनुमान</p>
</div>

<div class="card">
<img src="https://github.com/Anuj1-web/Temple/blob/main/hanuman-shakti.webp?raw=true">
<p>हनुमान जी शक्ति रूप</p>
</div>
</div>
</div>

<!-- MANTRA -->
<div class="section">
<h2>मंत्र</h2>

<style>
.mantra-btn {
  background: linear-gradient(45deg, #ff6600, #cc0000);
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}

.mantra-screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff7f0;
  z-index: 999;
  overflow-y: auto;
}

.mantra-content {
  padding: 30px;
  text-align: center;
}

.mantra-box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 800px;
  margin: auto;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

.mantra-box pre {
  white-space: pre-wrap;
  font-family: 'Noto Serif Devanagari', serif;
  font-size: 20px;
  line-height: 2;
  text-align: left;
}

.back-btn {
  background: #cc0000;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-bottom: 20px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

<div class="cards">

<div class="card">
<button class="mantra-btn" onclick="openMantra('bajrang')">🚩 बजरंग बाण</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('chalisa')">📜 हनुमान चालीसा</button>
</div>

<div class="card">
<button class="mantra-btn" onclick="openMantra('aarti')">🪔 हनुमान आरती</button>
</div>

</div>
</div>

<!-- FULL SCREEN VIEW -->
<div id="mantraScreen" class="mantra-screen">
  <div class="mantra-content">
    <button class="back-btn" onclick="closeMantra()">⬅ वापस जाएं</button>
    <div id="mantraText"></div>
  </div>
</div>

<script>
function openMantra(type){
  document.getElementById("mantraScreen").style.display = "block";

  let text = "";

  if(type === "bajrang"){
    text = `
    <div class="mantra-box">
      <h2>🚩 बजरंग बाण</h2>
      <pre>
निश्चय प्रेम प्रतीति ते, विनय करैं सनमान ।
तेहि के कारज सकल शुभ, सिद्ध करें हनुमान ॥

जय हनुमन्त संत हितकारी ।
      </pre>
    </div>
    `;
  }

  if(type === "chalisa"){
    text = `
    <div class="mantra-box">
      <h2>📜 हनुमान चालीसा</h2>
      <pre>
श्रीगुरु चरन सरोज रज, निज मनु मुकुरु सुधारि ।
बरनउँ रघुबर बिमल जसु, जो दायकु फल चारि ॥

बुद्धिहीन तनु जानिके, सुमिरौं पवन कुमार ।
बल बुधि बिद्या देहु मोहिं, हरहु कलेस बिकार ॥
      </pre>
    </div>
    `;
  }

  if(type === "aarti"){
    text = `
    <div class="mantra-box">
      <h2>🪔 हनुमान आरती</h2>
      <pre>
आरती कीजै हनुमान लला की।
दुष्ट दलन रघुनाथ कला की॥

जाके बल से गिरिवर कांपे।
रोग दोष जाके निकट न झांके॥
      </pre>
    </div>
    `;
  }

  document.getElementById("mantraText").innerHTML = text;
}

function closeMantra(){
  document.getElementById("mantraScreen").style.display = "none";
}
</script>
<!-- BUTTONS -->
<div class="section">
<button class="btn" onclick="showForm('dhwaj')">🚩 ध्वज चढ़ाएं (₹200)</button>
<button class="btn" onclick="showForm('bhandara')">🍛 भंडारा दान</button>
</div>

<!-- FORMS -->
<div id="dhwajForm" class="form-box">
<h3>ध्वज सेवा</h3>
<input id="dname" placeholder="नाम">
<input id="dphone" placeholder="मोबाइल">
<button class="btn" onclick="submitDhwaj()">Submit</button>
</div>

<div id="bhandaraForm" class="form-box">
<h3>भंडारा दान</h3>
<input id="bname" placeholder="नाम">
<input id="bphone" placeholder="मोबाइल">
<input id="amount" placeholder="राशि">
<button class="btn" onclick="submitBhandara()">Submit</button>
</div>

<!-- QR -->
<div class="section">
<h2>भुगतान QR</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=UPI-ID-HERE">
<p>UPI से भुगतान करें</p>
</div>

<!-- LIST -->
<div class="list">
<h2>दान करने वाले</h2>
<ul id="donorList"></ul>
</div>

<script>
function showForm(type){
  document.getElementById('dhwajForm').style.display='none';
  document.getElementById('bhandaraForm').style.display='none';

  if(type==='dhwaj'){
    document.getElementById('dhwajForm').style.display='block';
  } else {
    document.getElementById('bhandaraForm').style.display='block';
  }
}

function saveData(name, type, amount){
  let data = JSON.parse(localStorage.getItem("donors")) || [];
  data.push({name, type, amount});
  localStorage.setItem("donors", JSON.stringify(data));
  display();
}

function submitDhwaj(){
  let name = document.getElementById('dname').value;
  saveData(name, "ध्वज", 200);
}

function submitBhandara(){
  let name = document.getElementById('bname').value;
  let amount = document.getElementById('amount').value;
  saveData(name, "भंडारा", amount);
}

function display(){
  let list = document.getElementById("donorList");
  list.innerHTML="";
  let data = JSON.parse(localStorage.getItem("donors")) || [];
  data.forEach(d=>{
    list.innerHTML += `<li>${d.name} - ${d.type} - ₹${d.amount}</li>`;
  });
}

display();
</script>

</body>
</html>
