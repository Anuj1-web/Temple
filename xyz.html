<!-- HOME -->
<div id="homePage" class="section">
  <h2>सेवा एवं दान</h2>

  <div class="cards">
    <div class="card" onclick="openPage('bhandaraPage')">
      <h3>🍛 मंदिर एवं भंडारा दान</h3>
    </div>

    <div class="card" onclick="openPage('dhwajPage')">
      <h3>🚩 ध्वज सेवा</h3>
    </div>
  </div>
</div>

<style>
.page {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff7f0;
  padding-top: 40px;
  z-index: 1000;
  overflow-y: auto;
}

.form-card {
  background: linear-gradient(135deg, #ff6600, #cc0000);
  color: white;
  padding: 30px;
  border-radius: 20px;
  max-width: 420px;
  margin: auto;
  text-align: center;
  box-shadow: 
    0 0 20px rgba(255,102,0,0.6),
    0 0 40px rgba(255,0,0,0.3);
}

.form-card input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 8px;
}

.btn2 {
  background: white;
  color: #cc0000;
  padding: 12px 20px;
  border: none;
  margin-top: 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.back {
  text-align: center;
  margin-bottom: 20px;
  font-weight: bold;
  cursor: pointer;
  color: #cc0000;
}

.qr-page {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #ffcc80, #ff6600);
  text-align: center;
  padding-top: 60px;
  z-index: 1000;
}

.qr-box {
  background: white;
  padding: 25px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

.qr-box img {
  width: 80%;
  max-width: 350px;
}
</style>

<!-- BHANDARA -->
<div id="bhandaraPage" class="page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="form-card">
    <h3>🍛 मंदिर एवं भंडारा दान</h3>

    <input placeholder="नाम">
    <input placeholder="पिता का नाम">
    <input placeholder="पता">
    <input id="b_amount" placeholder="दान राशि">

    <button class="btn2" onclick="openQR('bhandara')">Proceed to Pay</button>
  </div>
</div>

<!-- DHWAJ -->
<div id="dhwajPage" class="page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="form-card">
    <h3>🚩 ध्वज सेवा</h3>

    <input placeholder="नाम">
    <input placeholder="पिता का नाम">
    <input placeholder="पता">
    <input id="flags" placeholder="ध्वज संख्या" oninput="calc()">

    <h3 id="total">कुल राशि: ₹0</h3>

    <button class="btn2" onclick="openQR('dhwaj')">Proceed to Pay</button>
  </div>
</div>

<!-- QR -->
<div id="qrPage" class="qr-page">
  <div class="back" onclick="goHome()">⬅ वापस जाएं</div>

  <div class="qr-box">
    <h3>भुगतान करें</h3>
    <img id="qrImage">
    <p id="payAmount"></p>
  </div>
</div>

<script>

/* RESET FORMS */
function resetForms(){
  // clear all input fields
  document.querySelectorAll("input").forEach(input => input.value = "");

  // reset dhwaj total
  let total = document.getElementById("total");
  if(total){
    total.innerText = "कुल राशि: ₹0";
  }
}

/* PAGES */
function openPage(page){
  document.getElementById("homePage").style.display = "none";
  document.getElementById("bhandaraPage").style.display = "none";
  document.getElementById("dhwajPage").style.display = "none";
  document.getElementById("qrPage").style.display = "none";

  document.getElementById(page).style.display = "block";
}

function goHome(){
  document.getElementById("homePage").style.display = "block";
  document.getElementById("bhandaraPage").style.display = "none";
  document.getElementById("dhwajPage").style.display = "none";
  document.getElementById("qrPage").style.display = "none";

  resetForms(); // ✅ important fix
}

/* CALC */
function calc(){
  let f = document.getElementById("flags").value || 0;
  document.getElementById("total").innerText = "कुल राशि: ₹" + (f * 200);
}

/* QR */
function openQR(type){
  let amount = 0;
  let upiID = "7878426819@ibl";

  if(type === "dhwaj"){
    amount = (document.getElementById("flags").value || 0) * 200;
  }

  if(type === "bhandara"){
    amount = document.getElementById("b_amount").value || 0;
  }

  let upiLink = `upi://pay?pa=${upiID}&pn=Temple&am=${amount}&cu=INR`;

  document.getElementById("qrImage").src =
    `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(upiLink)}`;

  document.getElementById("payAmount").innerText = "राशि: ₹" + amount;

  openPage("qrPage");

  resetForms(); // ✅ clears form after QR generation
}

</script>
